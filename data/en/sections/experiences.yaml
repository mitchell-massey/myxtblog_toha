  - company:
      name: PeerVsn
      location: Dallas, Texas
      url: "https://www.peervsn.com"
      logo: /images/sections/experiences/logo_peervsn.jpeg
      overview: The founders of Dallas-based Glass-Media, Daniel Black, and 900lbs, Steve Deitz joined forces to introduce PeerVsn, a cutting-edge streaming platform poised to revolutionize real-time, life-size, peer-to-peer communications. This collaboration leverages the unique capabilities of both companies to bring a portable, battery powered streaming to the masses. After extensive R&D in stealth mode and with a second-mover advantage, the PeerVsn platform is designed for seamless deployment across various verticals including education, entertainment, sports, corporate, healthcare and retail. PeerVsn is engineered for versatility and ease of use, enabling platform hosts to engage audiences from anywhere in the world with a simple studio kit that can be set up in minutes. The compact design of PeerVsn allows it to easily fit within elevators and navigate through narrow corridors such as hallways, walkways and doorways, enhancing its usability across a wide range of environments.
