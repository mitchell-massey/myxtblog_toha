summary: I am a future-focused experience leader who bridges the gap between complex engineering and human-centered storytelling. From my early roots in human-computer interaction at Rice University and SMU to my current role at 900lbs, I have spearheaded the delivery of immersive, scalable technology platforms by blending technical project management with a deep fascination for psychology and emerging tech. I thrive on operationalizing innovation, whether by scaling organizational change or leveraging AI to solve the most intricate B2B product challenges, ensuring every project is a high-performance marriage of vision and results.
